blacklist:
  leveraged:
    reason: "Leveraged ETFs experience decay and are unsuitable for long-term holding"
    reason_he: "קרנות ממונפות סובלות מדעיכה ואינן מתאימות להחזקה ארוכת טווח"
    tickers: [TQQQ, SQQQ, SOXL, SOXS, UPRO, SPXU, TMF, TYD, UDOW, SDOW, UVXY, SVXY, LABU, LABD]

  covered_call:
    reason: "Covered call strategies cap upside and create complex tax events"
    reason_he: "אסטרטגיות Covered Call מגבילות עלייה ויוצרות אירועי מס מורכבים"
    tickers: [JEPI, JEPQ, QYLD, XYLD, RYLD, NUSI, DIVO, OARK, SVOL]

  thematic_high_concentration:
    reason: "Highly concentrated thematic funds with >25% single-stock risk"
    reason_he: "קרנות ממוקדות בעלות ריכוז גבוה מדי במניה בודדת"
    tickers: [ARKK, ARKW, ARKF, ARKG, ARKQ, ICLN, TAN, BLOK, BOTZ, ROBO, DRIV, HACK, BUG]

  inverse:
    reason: "Inverse ETFs are short-term tactical instruments, not long-term holdings"
    reason_he: "קרנות הפוכות הן כלי טקטי לטווח קצר, לא להחזקה ארוכת טווח"
    tickers: [SH, SDS, PSQ, DOG, RWM, MYY, SQQQ, SPXS]

  high_ter:
    reason: "TER above 0.50% — cost drag is too significant for long-term compounding"
    reason_he: "עלות שנתית מעל 0.50% — מכרסמת בצמיחה לאורך זמן"
    threshold: 0.50
    exceptions: [DEM, EEM, DLS]  # kept for proxy/history reasons only
