repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^backend/app/
        args: [--ignore-missing-imports]
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy>=2.0
          - fastapi

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: no-console-log
        name: No console.log in production code
        language: pygrep
        entry: 'console\.log'
        files: ^frontend/src/
        exclude: '^frontend/src/test'

      - id: no-print-stmt
        name: No print() in production code
        language: pygrep
        entry: '^\s*print\('
        files: ^backend/app/
